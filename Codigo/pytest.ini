#  pytest.ini – Configuración del framework TDD
[pytest]
# Habilita modo asyncio automático para todos los tests async
asyncio_mode = auto

# Directorio donde pytest buscará los tests
testpaths = tests

# Formato de output más detallado
addopts =
    -v
    --tb=short
    --strict-markers

# Markers personalizados para clasificar los tests por módulo
markers =
    unit: Tests unitarios aislados (sin red)
    integration: Tests de integración con mocks HTTP
    crawler: Tests del módulo de crawling y extracción DOM
    rest: Tests del módulo de escaneo REST/AJAX
    passive: Tests del módulo de infraestructura pasiva
    reporter: Tests del módulo de generación de reportes
